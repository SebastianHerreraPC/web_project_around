<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="index.css" />
    <title>Document</title>
  </head>
  <body>
    <header class="header">
      <img src="./images/logo.png" alt="Logo" class="header__logo" />
    </header>

    <main class="content">
      <section class="profile">
        <img
          src="./images/jacques.png"
          alt="profile__avatar"
          class="profile__avatar"
        />
        <div class="profile__information">
          <div class="profile__information-container">
            <p class="profile__name">Jacques Counsteau</p>
            <button class="button button__type-edit"></button>
          </div>
          <p class="profile__job">Explorer</p>
        </div>
        <button class="button button__type-add"></button>
      </section>
      <div class="pop pop__content_edit-profile" style="display: none">
        <div class="pop__overslide"></div>
        <div class="pop__content">
          <div class="pop__container">
            <button class="button button__type-close"></button>
            <span class="pop__title">Edit</span>
            <form class="pop__form">
              <fieldset class="form__set">
                <input
                  type="text"
                  name="input-name"
                  id="input-name"
                  class="pop__input pop__input-name"
                  placeholder="Name"
                  required
                  minlength="1"
                  maxlength="50"
                />
                <span class="form__error"></span>
                <input
                  type="text"
                  name="input-job"
                  id="input-job"
                  class="pop__input pop__input-job"
                  placeholder="Job"
                  required
                  minlength="1"
                  maxlength="50"
                />
                <span class="form__error"></span>
              </fieldset>
              <fieldset class="form__set">
                <button type="submit" class="button button__type-submit">
                  Save
                </button>
              </fieldset>
            </form>
          </div>
        </div>
      </div>
      <section class="cards"></section>
    </main>
    <footer class="footer">
      <div class="footer__text"></div>
    </footer>

    <template class="template__cards">
      <div class="card">
        <img
          src="./images/places/Wulingyuan.jpg"
          alt="Wulingyuan"
          class="card__image"
        />
        <div class="card__information">
          <p class="card__title">Wulingyuan</p>
          <button class="button button__type-like"></button>
          <button class="button button__type-trash"></button>
        </div>
      </div>
    </template>
    <template class="template__cards">
      <div class="card">
        <img alt="card image" class="card__image" />
        <div class="card__information">
          <p class="card__title"></p>
          <button class="button button__type-like"></button>
          <button class="button button__type-trash"></button>
        </div>
      </div>
    </template>
    <section class="popup popup__add-card">
      <div class="popup__cover">
        <div class="popup__content">
          <button class="button button__type-close"></button>
          <h2 class="popup__form-title">Add</h2>
          <form action="" class="popup__form">
            <fieldset class="popup__form-set">
              <input
                type="text"
                name="popup-nombre"
                id="popup-nombre"
                placeholder="Nombre"
                required
                minlength="1"
                maxlength="30"
              />
              <input
                type="url"
                name="popup-link"
                id="popup-link"
                placeholder="Enlace de la imagen"
                required
              />
            </fieldset>
            <fieldset class="popup__form-set">
              <button class="button button__type-submit">Guardar</button>
            </fieldset>
          </form>
        </div>
      </div>
    </section>

    <script src="/scripts/index.js"></script>
    <script src="/scripts/index2.js"></script>
  </body>
</html>
