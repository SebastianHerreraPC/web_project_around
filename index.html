<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="index.css" />
    <title>Around the US</title>
  </head>
  <body class="body">
    <header class="header">
      <img class="header__logo" src="/images/logo.svg" alt="logo" />
    </header>
    <main class="main">
      <section class="profile">
        <img
          src="/images/avatar.jpg"
          alt="Imagen-de-perfil"
          class="profile__image"
        />
        <div class="profile__info">
          <div class="profile__container">
            <h1 class="profile__name">Jacques Consteau</h1>
            <button class="profile__button-edit">
              <img src="/images/edit.svg" alt="" />
            </button>
          </div>
          <p class="profile__job">Explorer</p>
        </div>
        <button class="profile__button-add">
          <img src="./images/add.svg" alt="" />
        </button>
      </section>
      <section class="cards">
        <div class="card">
          <img
            src="/images/places/Arashiyama.jpg"
            alt="Arashiyama"
            class="card__image"
          />
          <div class="card__info">
            <p class="card__text">Arashiyama</p>
            <button class="card__button-like">
              <img src="/images/heart.svg" alt="Like" />
            </button>
            <button class="card__button-trash"></button>
          </div>
        </div>
        <div class="card">
          <img
            src="/images/places/Arizona.jpg"
            alt="Arizona"
            class="card__image"
          />
          <div class="card__info">
            <p class="card__text">Arizona</p>
            <button class="card__button-like">
              <img src="/images/heart.svg" alt="Like" />
            </button>
            <button class="card__button-trash"></button>
          </div>
        </div>
        <div class="card">
          <img
            src="/images/places/Azores.jpg"
            alt="Azores"
            class="card__image"
          />
          <div class="card__info">
            <p class="card__text">Azores</p>
            <button class="card__button-like">
              <img src="/images/heart.svg" alt="Like" />
            </button>
            <button class="card__button-trash"></button>
          </div>
        </div>
        <div class="card">
          <img src="/images/places/Namib.jpg" alt="Namib" class="card__image" />
          <div class="card__info">
            <p class="card__text">Namib</p>
            <button class="card__button-like">
              <img src="/images/heart.svg" alt="Like" />
            </button>
            <button class="card__button-trash"></button>
          </div>
        </div>
        <div class="card">
          <img
            src="/images/places/Reynisfjara.jpg"
            alt="Reynisfjara"
            class="card__image"
          />
          <div class="card__info">
            <p class="card__text">Reynisfjara</p>
            <button class="card__button-like">
              <img src="/images/heart.svg" alt="Like" />
            </button>
            <button class="card__button-trash"></button>
          </div>
        </div>
        <div class="card">
          <img
            src="/images/places/Wulingyuan.jpg"
            alt="Wulingyuan"
            class="card__image"
          />
          <div class="card__info">
            <p class="card__text">Wulingyuan</p>
            <button class="card__button-like">
              <img src="/images/heart.svg" alt="Like" />
            </button>
            <button class="card__button-trash"></button>
          </div>
        </div>
      </section>
    </main>
    <div class="popup popup_profile">
      <div class="popup__overlay"></div>
      <div class="popup__content">
        <form id="popupaddprofile" class="popup__form">
          <button
            type="button"
            id="closeicon"
            class="popup__close-icon"
          ></button>
          <h2 class="popup__edit">Editar perfil</h2>
          <input
            type="text"
            minlength="2"
            maxlength="40"
            class="popup__input popup__input-name"
            placeholder="Nombre"
            value="Tu nombre"
            name="name"
            required
          />
          <input
            type="text"
            minlength="2"
            maxlength="200"
            class="popup__input popup__input-about"
            placeholder="Acerca de mi"
            value="Tu trabajo"
            name="about"
            required
          />
          <button type="submit" class="popup__button">Guardar</button>
        </form>
      </div>
    </div>
    <footer class="footer">
      <p class="footer__info">&copy;2024 Sebastián Herrera</p>
    </footer>

    <script></script>
  </body>
</html>
