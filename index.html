<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="index.css" />
    <title>Document</title>
  </head>
  <body>
    <header class="header">
      <img src="./images/logo_aus.svg" alt="Logo" class="header__logo" />
    </header>

    <main class="content">
      <section class="profile">
        <img
          src="./images/profile.png"
          alt="profile__avatar"
          class="profile__avatar"
        />
        <div class="profile__information">
          <div class="profile__information-container">
            <p class="profile__name">Jacques Counsteau</p>
            <button class="button button__type-edit"></button>
          </div>
          <p class="profile__job">Explorer</p>
        </div>
        <button class="button button__type-add"></button>
      </section>
      <div class="pop pop__content_edit-profile" style="display: none">
        <div class="pop__overslide"></div>
        <div class="pop__content">
          <div class="pop__container">
            <button class="button button__type-close"></button>
            <span class="pop__title">Edit</span>
            <form class="pop__form">
              <fieldset class="form__set">
                <input
                  type="text"
                  name="input-name"
                  id="input-name"
                  class="pop__input pop__input-name"
                  placeholder="Name"
                  required
                  minlength="1"
                  maxlength="50"
                />
                <span class="form__error"></span>
                <input
                  type="text"
                  name="input-job"
                  id="input-job"
                  class="pop__input pop__input-job"
                  placeholder="Job"
                  required
                  minlength="1"
                  maxlength="50"
                />
                <span class="form__error"></span>
              </fieldset>
              <fieldset class="form__set">
                <button type="submit" class="button button__type-submit">
                  Save
                </button>
              </fieldset>
            </form>
          </div>
        </div>
      </div>
      <section class="cards">
        <div class="card">
          <img
            src="./images/places/Arashiyama.jpg"
            alt="Arashiyama_Forest"
            class="card__image"
          />
          <div class="card__information">
            <span class="card__title">Arashiyama</span>
            <button class="button button__type-like"></button>
          </div>
        </div>
        <div class="card">
          <img
            src="./images/places/Arizona.jpg"
            alt="Arizona__desert"
            class="card__image"
          />
          <div class="card__information">
            <span class="card__title">Arizona</span>
            <button class="button button__type-like"></button>
          </div>
        </div>
        <div class="card">
          <img
            src="./images/places/Azores.jpg"
            alt="Azores_ocean
            "
            class="card__image"
          />
          <div class="card__information">
            <span class="card__title">Azores</span>
            <button class="button button__type-like"></button>
          </div>
        </div>
        <div class="card">
          <img
            src="./images/places/Namib.jpg"
            alt="Nabim__pic"
            class="card__image"
          />
          <div class="card__information">
            <span class="card__title">Namib</span>
            <button class="button button__type-like"></button>
          </div>
        </div>
        <div class="card">
          <img
            src="./images/places/Reynisfjara.jpg"
            alt="Reynisfjara"
            class="card__image"
          />
          <div class="card__information">
            <span class="card__title">Reynisfjara</span>
            <button class="button button__type-like"></button>
          </div>
        </div>
        <div class="card">
          <img
            src="./images/places/Wulingyuan.jpg"
            alt="Wulingyuan"
            class="card__image"
          />
          <div class="card__information">
            <span class="card__title">Wulingyuan</span>
            <button class="button button__type-like"></button>
          </div>
        </div>
      </section>
    </main>
    <footer class="footer">
      <div class="footer__text">
        <span class="footer__copyright">© 2023 Arround The U.S.</span>
      </div>
    </footer>

    <script src="./index.js"></script>
  </body>
</html>
